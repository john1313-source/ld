<!doctype html>
<html lang="ko">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>미국 배당기업 실시간 트래커</title>
    <link rel="stylesheet" href="./style.css">
  </head>
  <body>
    <header class="app-header">
      <div>
        <p class="eyebrow">Dividend Yield Tracker</p>
        <h1>미국 배당기업 실시간 트래커</h1>
      </div>
      <div class="meta-panel" aria-live="polite">
        <span id="lastUpdated">마지막 갱신: 불러오는 중</span>
        <span id="statusCount">OK 0 / Failed 0</span>
      </div>
    </header>

    <main>
      <section class="toolbar" aria-label="필터와 검색">
        <label>
          <span>카테고리</span>
          <select id="categoryFilter">
            <option value="통합">통합</option>
            <option value="주식">주식</option>
            <option value="ETF">ETF</option>
          </select>
        </label>
        <label>
          <span>ETF 유형</span>
          <select id="etfTypeFilter">
            <option value="">전체</option>
          </select>
        </label>
        <label>
          <span>레벨</span>
          <select id="levelFilter">
            <option value="">전체</option>
          </select>
        </label>
        <label>
          <span>섹터</span>
          <select id="sectorFilter">
            <option value="">전체</option>
          </select>
        </label>
        <label class="search-field">
          <span>검색</span>
          <input id="searchInput" type="search" placeholder="기업명 또는 티커">
        </label>
        <button id="resetButton" type="button">초기화</button>
      </section>

      <section class="summary" aria-label="요약">
        <div>
          <span class="summary-label">표시</span>
          <strong id="visibleCount">0</strong>
        </div>
        <div>
          <span class="summary-label">평균 대비 고배당</span>
          <strong id="positiveCount">0</strong>
        </div>
        <div>
          <span class="summary-label">데이터 실패</span>
          <strong id="failedCount">0</strong>
        </div>
      </section>

      <section class="table-section" aria-label="배당기업 목록">
        <div class="table-wrap">
          <table>
            <thead>
              <tr>
                <th><button data-sort="name_ko" type="button">기업명</button></th>
                <th><button data-sort="ticker" type="button">티커</button></th>
                <th><button data-sort="asset_category" type="button">카테고리</button></th>
                <th><button data-sort="etf_type" type="button">ETF 유형</button></th>
                <th><button data-sort="level" type="button">레벨</button></th>
                <th><button data-sort="sector" type="button">섹터</button></th>
                <th class="numeric"><button data-sort="price" type="button">현재가</button></th>
                <th class="numeric"><button data-sort="live_yield" type="button">현재 배당률</button></th>
                <th class="numeric"><button data-sort="avg_yield_5y" type="button">5년 평균</button></th>
                <th class="numeric emphasis"><button data-sort="live_yield_diff_5y" type="button">5년 차이</button></th>
                <th class="numeric"><button data-sort="avg_yield_10y" type="button">10년 평균</button></th>
                <th class="numeric emphasis"><button data-sort="live_yield_diff" type="button">10년 차이</button></th>
                <th class="numeric"><button data-sort="increase_years" type="button">연속증가</button></th>
                <th class="numeric"><button data-sort="growth_5y" type="button">5년 성장률</button></th>
                <th class="numeric"><button data-sort="payout_ratio" type="button">배당성향</button></th>
                <th><button data-sort="pay_months" type="button">지급월</button></th>
              </tr>
            </thead>
            <tbody id="tableBody"></tbody>
          </table>
        </div>
        <div id="mobileList" class="mobile-list"></div>
        <p id="emptyState" class="empty-state" hidden>조건에 맞는 기업이 없습니다.</p>
      </section>
    </main>

    <dialog id="detailDialog">
      <button class="dialog-close" id="closeDialog" type="button" aria-label="닫기">×</button>
      <div id="detailContent"></div>
    </dialog>

    <script src="./app.js"></script>
  </body>
</html>
